<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mesmerizing Particle Cursor</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>
  <div class="glass-panel">
    <div class="controls">
      <button type="button" id="colors-btn" title="Change colors instantly">✨ Random Colors</button>
      <button type="button" id="auto-btn" title="Toggle automatic color changing">🔄 Auto: OFF</button>
      
      <div class="slider-group">
        <label for="size-slider">Particle Size:</label>
        <input type="range" id="size-slider" min="0.5" max="4" step="0.1" value="1.5">
      </div>
    </div>
    
    <a href="https://github.com/pankajtiwari-art?tab=repositories" target="_blank" class="profile-link">
      👨‍💻 Pankaj Tiwari | Dev Profile
    </a>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
